name: Ops Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - develop
      - main
    paths:
      - infrastructure/**

permissions:
  contents: read

env:
  INFRA_CHART_PATH: ./infrastructure/k8s

jobs:
  deploy-infra-staging:
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"

      - name: Deploy infrastructure chart (Kafka + PostgreSQL)
        run: |
          helm upgrade --install infrastructure "${INFRA_CHART_PATH}" \
            --namespace staging \
            --create-namespace

  deploy-infra-production:
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"

      - name: Deploy infrastructure chart (Kafka + PostgreSQL)
        run: |
          helm upgrade --install infrastructure "${INFRA_CHART_PATH}" \
            --namespace production \
            --create-namespace
