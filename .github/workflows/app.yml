name: Application CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OPS_EVENT_TYPE: app-image-ready

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services_matrix: ${{ steps.set-matrix.outputs.services_matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - .github/workflows/app.yml
            vote:
              - vote/**
            result:
              - result/**
            worker:
              - worker/**

      - name: Build matrix for changed services
        id: set-matrix
        env:
          SHARED: ${{ steps.filter.outputs.shared }}
          VOTE: ${{ steps.filter.outputs.vote }}
          RESULT: ${{ steps.filter.outputs.result }}
          WORKER: ${{ steps.filter.outputs.worker }}
        run: |
          services=()

          if [[ "$SHARED" == "true" || "$VOTE" == "true" ]]; then
            services+=("vote")
          fi
          if [[ "$SHARED" == "true" || "$RESULT" == "true" ]]; then
            services+=("result")
          fi
          if [[ "$SHARED" == "true" || "$WORKER" == "true" ]]; then
            services+=("worker")
          fi

          if [[ ${#services[@]} -eq 0 ]]; then
            echo 'services_matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json_list=$(printf '"%s",' "${services[@]}")
          json_list="[${json_list%,}]"

          echo "services_matrix={\"service\":${json_list}}" >> "$GITHUB_OUTPUT"
          echo 'has_changes=true' >> "$GITHUB_OUTPUT"

  test:
    name: Test changed services
    needs: changes
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.services_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        if: matrix.service == 'vote'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Test vote service
        if: matrix.service == 'vote'
        run: mvn -B -f vote/pom.xml test

      - name: Set up Node.js
        if: matrix.service == 'result'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Test result service
        if: matrix.service == 'result'
        working-directory: result
        run: |
          npm install
          npm test

      - name: Set up Go
        if: matrix.service == 'worker'
        uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
          cache-dependency-path: worker/go.mod

      - name: Test worker service
        if: matrix.service == 'worker'
        working-directory: worker
        run: go test -mod=mod ./...

  build-and-push:
    name: Build and push images
    needs: changes
    if: ${{ github.event_name == 'push' && needs.changes.outputs.has_changes == 'true' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.services_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SERVICE: ${{ matrix.service }}
        run: |
          owner_lc=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          service_lc=$(echo "$SERVICE" | tr '[:upper:]' '[:lower:]')
          echo "name=${{ env.REGISTRY }}/${owner_lc}/${repo_lc}-${service_lc}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  trigger-ops-deploy:
    name: Trigger ops-repo deploy
    needs:
      - changes
      - build-and-push
    if: ${{ github.event_name == 'push' && needs.changes.outputs.has_changes == 'true' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.services_matrix) }}
    steps:
      - name: Compose deployment payload
        id: deploy_payload
        env:
          BRANCH: ${{ github.ref_name }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SERVICE: ${{ matrix.service }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          owner_lc=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          service_lc=$(echo "$SERVICE" | tr '[:upper:]' '[:lower:]')

          if [[ "$BRANCH" == "main" ]]; then
            environment="production"
          else
            environment="staging"
          fi

          echo "image=${REGISTRY}/${owner_lc}/${repo_lc}-${service_lc}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "environment=${environment}" >> "$GITHUB_OUTPUT"

      - name: Trigger ops repository deploy workflow
        env:
          OPS_REPO: ${{ vars['OPS_REPO'] }}
          OPS_REPO_TOKEN: ${{ secrets['OPS_REPO_TOKEN'] }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
          SOURCE_ACTOR: ${{ github.actor }}
          SERVICE: ${{ matrix.service }}
          IMAGE: ${{ steps.deploy_payload.outputs.image }}
          TAG: ${{ steps.deploy_payload.outputs.tag }}
          ENVIRONMENT: ${{ steps.deploy_payload.outputs.environment }}
          EVENT_TYPE: ${{ env.OPS_EVENT_TYPE }}
        run: |
          if [[ -z "$OPS_REPO" ]]; then
            echo "Missing repository variable OPS_REPO (example: my-org/ops-repo)."
            exit 1
          fi

          if [[ -z "$OPS_REPO_TOKEN" ]]; then
            echo "Missing secret OPS_REPO_TOKEN (token with access to dispatch workflows in ops repo)."
            exit 1
          fi

          image_ref="${IMAGE}:${TAG}"

          payload=$(cat <<EOF
          {
            "event_type": "${EVENT_TYPE}",
            "client_payload": {
              "service": "${SERVICE}",
              "image": "${IMAGE}",
              "tag": "${TAG}",
              "image_ref": "${image_ref}",
              "environment": "${ENVIRONMENT}",
              "source_repo": "${SOURCE_REPO}",
              "source_sha": "${SOURCE_SHA}",
              "source_ref": "${SOURCE_REF}",
              "source_actor": "${SOURCE_ACTOR}"
            }
          }
          EOF
          )

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${OPS_REPO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OPS_REPO}/dispatches" \
            -d "${payload}"
